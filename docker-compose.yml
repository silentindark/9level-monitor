services:
  collector:
    build: .
    container_name: 9level-collector
    restart: unless-stopped
    env_file: .env
    environment:
      - TZ=America/Sao_Paulo
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - internal

  frontend:
    build: ./frontend
    container_name: 9level-frontend
    restart: unless-stopped
    ports:
      - "8100:80"
    depends_on:
      collector:
        condition: service_healthy
    networks:
      - internal

networks:
  internal:
    driver: bridge
